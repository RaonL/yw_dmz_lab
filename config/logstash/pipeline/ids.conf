input {
  beats {
    port => 5045
    host => "0.0.0.0"
  }
}
filter {
  if "ids" in [log_type] {
    json {
      source => "message"
      target => "suricata"
    }
    if [suricata][event_type] == "alert" {
      mutate {
        add_field => {
          "alert_signature" => "%{[suricata][alert][signature]}"
          "alert_category" => "%{[suricata][alert][category]}"
          "src_ip" => "%{[suricata][src_ip]}"
          "dest_ip" => "%{[suricata][dest_ip]}"
        }
      }
    }
    date {
      match => [ "[suricata][timestamp]", "ISO8601" ]
      target => "@timestamp"
    }
  }
}
output {
  if "ids" in [log_type] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "suricata-dmz-%{+YYYY.MM.dd}"
    }
  }
}
